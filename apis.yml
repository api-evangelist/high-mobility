aid: high-mobility
name: High Mobility
description: >-
  High Mobility provides a connected car API platform that enables developers
  to build apps using real-time data from vehicles. The platform provides
  access to car data such as location, fuel level, door locks, diagnostics,
  and other vehicle telemetry data.
