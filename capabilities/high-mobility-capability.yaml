naftiko: 1.0.0-alpha2
info:
  label: High Mobility Vehicle API
  description: The High Mobility Vehicle API provides standardized access to connected car data across more than 500 models
    from major automotive OEMs. Endpoints return real-time vehicle telemetry covering location, doors, charging, diagnostics,
    climate, trips, and other capabilities. Authentication is handled with OAuth 2.0 against the High Mobility platform.
  tags:
  - High
  - Mobility
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: high-mobility
    baseUri: https://api.high-mobility.com
    description: High Mobility Vehicle API HTTP API.
    authentication:
      type: bearer
      token: '{{HIGH_MOBILITY_TOKEN}}'
    resources:
    - name: v1-access-token
      path: /v1/access_token
      operations:
      - name: createaccesstoken
        method: POST
        description: Create OAuth 2.0 access token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-vehicle-data-autoapi-13-vin
      path: /v1/vehicle-data/autoapi-13/{vin}
      operations:
      - name: getvehicledata
        method: GET
        description: Get vehicle data by VIN
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
          description: Vehicle Identification Number.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-eligibility-vin
      path: /v1/eligibility/{vin}
      operations:
      - name: getvehicleeligibility
        method: GET
        description: Get vehicle eligibility
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-fleet-vehicles
      path: /v1/fleet/vehicles
      operations:
      - name: listfleetvehicles
        method: GET
        description: List fleet vehicles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: addfleetvehicle
        method: POST
        description: Register vehicle to fleet
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: v1-fleet-vehicles-vin
      path: /v1/fleet/vehicles/{vin}
      operations:
      - name: getfleetvehicle
        method: GET
        description: Get fleet vehicle
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: removefleetvehicle
        method: DELETE
        description: Remove fleet vehicle
        inputParameters:
        - name: vin
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: high-mobility-rest
    description: REST adapter for High Mobility Vehicle API.
    resources:
    - path: /v1/access_token
      name: createaccesstoken
      operations:
      - method: POST
        name: createaccesstoken
        description: Create OAuth 2.0 access token
        call: high-mobility.createaccesstoken
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vehicle-data/autoapi-13/{vin}
      name: getvehicledata
      operations:
      - method: GET
        name: getvehicledata
        description: Get vehicle data by VIN
        call: high-mobility.getvehicledata
        with:
          vin: rest.vin
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/eligibility/{vin}
      name: getvehicleeligibility
      operations:
      - method: GET
        name: getvehicleeligibility
        description: Get vehicle eligibility
        call: high-mobility.getvehicleeligibility
        with:
          vin: rest.vin
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fleet/vehicles
      name: listfleetvehicles
      operations:
      - method: GET
        name: listfleetvehicles
        description: List fleet vehicles
        call: high-mobility.listfleetvehicles
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fleet/vehicles
      name: addfleetvehicle
      operations:
      - method: POST
        name: addfleetvehicle
        description: Register vehicle to fleet
        call: high-mobility.addfleetvehicle
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fleet/vehicles/{vin}
      name: getfleetvehicle
      operations:
      - method: GET
        name: getfleetvehicle
        description: Get fleet vehicle
        call: high-mobility.getfleetvehicle
        with:
          vin: rest.vin
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/fleet/vehicles/{vin}
      name: removefleetvehicle
      operations:
      - method: DELETE
        name: removefleetvehicle
        description: Remove fleet vehicle
        call: high-mobility.removefleetvehicle
        with:
          vin: rest.vin
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: high-mobility-mcp
    transport: http
    description: MCP adapter for High Mobility Vehicle API for AI agent use.
    tools:
    - name: createaccesstoken
      description: Create OAuth 2.0 access token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: high-mobility.createaccesstoken
      outputParameters:
      - type: object
        mapping: $.
    - name: getvehicledata
      description: Get vehicle data by VIN
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: high-mobility.getvehicledata
      with:
        vin: tools.vin
      inputParameters:
      - name: vin
        type: string
        description: Vehicle Identification Number.
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: getvehicleeligibility
      description: Get vehicle eligibility
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: high-mobility.getvehicleeligibility
      with:
        vin: tools.vin
      inputParameters:
      - name: vin
        type: string
        description: vin
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: listfleetvehicles
      description: List fleet vehicles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: high-mobility.listfleetvehicles
      outputParameters:
      - type: object
        mapping: $.
    - name: addfleetvehicle
      description: Register vehicle to fleet
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: high-mobility.addfleetvehicle
      outputParameters:
      - type: object
        mapping: $.
    - name: getfleetvehicle
      description: Get fleet vehicle
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: high-mobility.getfleetvehicle
      with:
        vin: tools.vin
      inputParameters:
      - name: vin
        type: string
        description: vin
        required: true
      outputParameters:
      - type: object
        mapping: $.
    - name: removefleetvehicle
      description: Remove fleet vehicle
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: high-mobility.removefleetvehicle
      with:
        vin: tools.vin
      inputParameters:
      - name: vin
        type: string
        description: vin
        required: true
      outputParameters:
      - type: object
        mapping: $.
binds:
- namespace: env
  keys:
    HIGH_MOBILITY_TOKEN: HIGH_MOBILITY_TOKEN
