naftiko: 1.0.0-alpha2
info:
  label: High Mobility Vehicle API — Vehicle Data
  description: 'High Mobility Vehicle API — Vehicle Data. 1 operations. Lead operation: Get vehicle data by VIN. Self-contained
    Naftiko capability covering one High Mobility business surface.'
  tags:
  - High Mobility
  - Vehicle Data
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    HIGH_MOBILITY_API_KEY: HIGH_MOBILITY_API_KEY
capability:
  consumes:
  - type: http
    namespace: high-mobility-vehicle-data
    baseUri: https://api.high-mobility.com
    description: High Mobility Vehicle API — Vehicle Data business capability. Self-contained, no shared references.
    resources:
    - name: v1-vehicle-data-autoapi-13-vin
      path: /v1/vehicle-data/autoapi-13/{vin}
      operations:
      - name: getvehicledata
        method: GET
        description: Get vehicle data by VIN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: vin
          in: path
          type: string
          description: Vehicle Identification Number.
          required: true
    authentication:
      type: bearer
      token: '{{env.HIGH_MOBILITY_API_KEY}}'
  exposes:
  - type: rest
    namespace: high-mobility-vehicle-data-rest
    port: 8080
    description: REST adapter for High Mobility Vehicle API — Vehicle Data. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/vehicle-data/autoapi-13/{vin}
      name: v1-vehicle-data-autoapi-13-vin
      description: REST surface for v1-vehicle-data-autoapi-13-vin.
      operations:
      - method: GET
        name: getvehicledata
        description: Get vehicle data by VIN
        call: high-mobility-vehicle-data.getvehicledata
        with:
          vin: rest.vin
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: high-mobility-vehicle-data-mcp
    port: 9090
    transport: http
    description: MCP adapter for High Mobility Vehicle API — Vehicle Data. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-vehicle-data-vin
      description: Get vehicle data by VIN
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: high-mobility-vehicle-data.getvehicledata
      with:
        vin: tools.vin
      outputParameters:
      - type: object
        mapping: $.
